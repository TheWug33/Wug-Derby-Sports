<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0f14" />
    <meta name="description" content="Fantasy Sports Pool Hub - HR Derby & World Cup 2026" />
    <title>Wug Derby Pools</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
  body { margin: 0; background: #0d0f14; }
  #wdp-splash{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:99999;animation:wdpFade 1.8s ease forwards}
  #wdp-splash img{width:70%;max-width:420px;animation:wdpPop 2.3s ease forwards}
  @keyframes wdpFade{0%,60%{opacity:1;visibility:visible}100%{opacity:0;visibility:hidden}}
  @keyframes wdpPop{0%{transform:scale(.85);opacity:0}25%{transform:scale(1);opacity:1}70%{opacity:1}100%{opacity:1}}
</style>

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
<div id="wdp-splash"><img src="/wugderby-logo.png" alt="Wug Derby Pools"/></div>

  </body>
</html>
